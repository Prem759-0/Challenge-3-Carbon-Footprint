<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>CarbonTrace — Track &amp; Reduce Your Carbon Footprint</title>
    <meta name="description" content="CarbonTrace is a premium carbon footprint tracker with AI coaching, gamified challenges, and a virtual offset forest. Understand, track, and reduce your emissions." />
    <meta name="keywords" content="carbon footprint, sustainability, eco, climate, carbon tracker, CO2, offset, green" />
    <meta name="author" content="CarbonTrace" />

    <!-- Open Graph -->
    <meta property="og:title" content="CarbonTrace — Premium Carbon Footprint Tracker" />
    <meta property="og:description" content="AI-powered sustainability dashboard with challenges, badges, and your own virtual forest." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#10b981" />

    <!-- Google Fonts: Bangers (comic) + Space Grotesk (modern) + Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

    <!-- Bootstrap CSS CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />

    <style>
      /* Critical: prevent FOUC */
      html { background: #07080f; }
      body { opacity: 0; transition: opacity 0.3s; }
      body.loaded { opacity: 1; }
    </style>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('loaded');
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
